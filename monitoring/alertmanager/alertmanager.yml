global:
  resolve_timeout: 5m

route:
  receiver: "default-webhook"
  group_by: ["alertname", "service"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

  routes:
    - matchers:
        - severity = "critical"
      receiver: "critical-webhook"
      group_wait: 5s
      repeat_interval: 30m

    - matchers:
        - severity = "page"
      receiver: "critical-webhook"
      group_wait: 0s
      repeat_interval: 15m

receivers:
  - name: "default-webhook"
    webhook_configs:
      - url: "http://webhook-sink:8080/alerts/default"
        send_resolved: true

  - name: "critical-webhook"
    webhook_configs:
      - url: "http://webhook-sink:8080/alerts/critical"
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname", "service"]
