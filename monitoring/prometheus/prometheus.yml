global:
  scrape_interval:     10s
  evaluation_interval: 10s
  external_labels:
    monitor: "sre-shop-monitor"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

rule_files:
  - "alert_rules.yml"

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "auth-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:8000"]
        labels: { service: "auth-service" }

  - job_name: "product-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["product-service:8000"]
        labels: { service: "product-service" }

  - job_name: "order-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["order-service:8000"]
        labels: { service: "order-service" }

  - job_name: "user-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["user-service:8000"]
        labels: { service: "user-service" }

  - job_name: "chat-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["chat-service:8000"]
        labels: { service: "chat-service" }

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
